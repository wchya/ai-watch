name: ai-watch

services:
  redis:
    image: ${REDIS_IMAGE:-redis:7-alpine}
    restart: unless-stopped
    stop_grace_period: 30s
    mem_limit: ${REDIS_MEM_LIMIT:-512m}
    pids_limit: 128
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --appendfsync
      - everysec
      - --aof-use-rdb-preamble
      - "yes"
      - --auto-aof-rewrite-percentage
      - "100"
      - --auto-aof-rewrite-min-size
      - 16mb
      - --maxmemory
      - ${REDIS_MAX_MEMORY:-384mb}
      - --maxmemory-policy
      - noeviction
      - --save
      - ""
    volumes:
      - ai-watch-redis-data:/data
    ports:
      - "127.0.0.1:${REDIS_PORT:-6379}:6379"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - SETGID
      - SETUID
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      start_period: 5s
      retries: 12

  mihomo:
    image: ${MIHOMO_IMAGE:-metacubex/mihomo:latest}
    restart: unless-stopped
    stop_grace_period: 15s
    mem_limit: ${MIHOMO_MEM_LIMIT:-256m}
    pids_limit: 128
    volumes:
      - ai-watch-mihomo-data:/root/.config/mihomo
      - type: bind
        source: ${MIHOMO_CONFIG_FILE:-./config/mihomo/config.yaml.example}
        target: /root/.config/mihomo/config.yaml
        read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "/mihomo", "-t", "-d", "/root/.config/mihomo"]
      interval: 10s
      timeout: 5s
      start_period: 10s
      retries: 6

  ai-watch:
    build:
      context: .
      args:
        NODE_BASE_IMAGE: ${NODE_BASE_IMAGE:-public.ecr.aws/docker/library/node:22-bookworm-slim}
        GO_BASE_IMAGE: ${GO_BASE_IMAGE:-public.ecr.aws/docker/library/golang:1.24-bookworm}
        CODEX_CLI_VERSION: ${CODEX_CLI_VERSION:-latest}
        CLAUDE_CLI_VERSION: ${CLAUDE_CLI_VERSION:-latest}
        DEBIAN_MIRROR: ${DEBIAN_MIRROR:-http://mirrors.aliyun.com}
        NPM_REGISTRY: ${NPM_REGISTRY:-https://registry.npmmirror.com}
    image: ai-watch:local
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      mihomo:
        condition: service_healthy
    stop_grace_period: 30s
    pids_limit: 256
    mem_limit: 2g
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    ports:
      - "127.0.0.1:${AI_WATCH_PORT:-8787}:8787"
    environment:
      AI_WATCH_ADDR: 0.0.0.0:8787
      AI_WATCH_DATA_DIR: /data
      AI_WATCH_RUNTIME_DIR: /run/ai-watch
      AI_WATCH_WEB_DIR: /app/web
      GOMEMLIMIT: ${AI_WATCH_GO_MEM_LIMIT:-96MiB}
      GOGC: ${AI_WATCH_GOGC:-80}
      AI_WATCH_CC_SWITCH_SYNC_TIMEOUT_SECONDS: ${AI_WATCH_CC_SWITCH_SYNC_TIMEOUT_SECONDS:-10}
      AI_WATCH_REDIS_URL: ${AI_WATCH_REDIS_URL:-redis://redis:6379/0}
      AI_WATCH_REDIS_REQUIRED: "true"
      AI_WATCH_MASTER_KEY: ${AI_WATCH_MASTER_KEY:-}
      AI_WATCH_DEFAULT_PROXY_URL: ${AI_WATCH_DEFAULT_PROXY_URL:-http://mihomo:7890}
      HTTP_PROXY: ${AI_WATCH_HTTP_PROXY:-http://mihomo:7890}
      HTTPS_PROXY: ${AI_WATCH_HTTPS_PROXY:-http://mihomo:7890}
      ALL_PROXY: ${AI_WATCH_ALL_PROXY:-socks5://mihomo:7891}
      NO_PROXY: ${AI_WATCH_NO_PROXY:-localhost,127.0.0.1,::1,ai-watch,redis,mihomo}
      DINGTALK_WEBHOOK_URL: ${DINGTALK_WEBHOOK_URL:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      CODEX_API_KEY: ${CODEX_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
      CODEX_BASE_URL: ${CODEX_BASE_URL:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_AUTH_TOKEN: ${ANTHROPIC_AUTH_TOKEN:-}
      ANTHROPIC_BASE_URL: ${ANTHROPIC_BASE_URL:-}
      CLAUDE_API_KEY: ${CLAUDE_API_KEY:-}
      CLAUDE_BASE_URL: ${CLAUDE_BASE_URL:-}
      CLAUDE_CODE_USE_BEDROCK: ${CLAUDE_CODE_USE_BEDROCK:-}
      CLAUDE_CODE_USE_VERTEX: ${CLAUDE_CODE_USE_VERTEX:-}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_SESSION_TOKEN: ${AWS_SESSION_TOKEN:-}
      AWS_REGION: ${AWS_REGION:-}
      AWS_PROFILE: ${AWS_PROFILE:-}
      GOOGLE_APPLICATION_CREDENTIALS: ${GOOGLE_APPLICATION_CREDENTIALS:-}
      CLOUD_ML_REGION: ${CLOUD_ML_REGION:-}
      ANTHROPIC_VERTEX_PROJECT_ID: ${ANTHROPIC_VERTEX_PROJECT_ID:-}
    volumes:
      - ai-watch-data:/data
      - type: bind
        source: ${CODEX_CONFIG_DIR:-${HOME}/.codex}
        target: /home/aiwatch/.codex
        read_only: true
      - type: bind
        source: ${CLAUDE_CONFIG_DIR:-${HOME}/.claude}
        target: /home/aiwatch/.claude
        read_only: true
      - type: bind
        source: ${CC_SWITCH_CONFIG_DIR:-${HOME}/.cc-switch}
        target: /home/aiwatch/.cc-switch
        # Startup-only CC Switch source; runtime Provider reads use Redis snapshots.
        read_only: true
    tmpfs:
      - /run/ai-watch:rw,noexec,nosuid,nodev,mode=0700,uid=0,gid=0,size=64m
    security_opt:
      - no-new-privileges:true
      - seccomp:unconfined
    cap_drop:
      - ALL
    cap_add:
      - SYS_ADMIN
    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "--show-error", "http://127.0.0.1:8787/api/health"]
      interval: 10s
      timeout: 3s
      start_period: 15s
      retries: 5

volumes:
  ai-watch-data:
  ai-watch-redis-data:
  ai-watch-mihomo-data:
